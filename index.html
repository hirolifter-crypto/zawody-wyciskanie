<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Zawody IPF</title>

<style>
body { font-family: Arial; background:#111; color:#fff; text-align:center; }
.container { display:flex; flex-wrap:wrap; justify-content:center; }
.group { border:1px solid #444; margin:10px; padding:10px; width:320px; }
input { margin:2px; padding:5px; width:80px; }
button { margin:5px; padding:12px; font-size:16px; }
h2 { color:yellow; }
</style>
</head>

<body>

<h1>PANEL SĘDZIOWSKI – IPF</h1>

<button onclick="openTV()">📺 Ekran TV</button>

<div class="container" id="groups"></div>

<h2>Pomost</h2>
<div id="platform"></div>

<button onclick="nextMove()">➡️ Następny ruch</button>

<script>

let groups = [10,10,10,12];
let lifters = [];

let currentGroup = 0;
let currentIndex = 0;
let currentRound = 0;

function init() {
  let container = document.getElementById("groups");
  container.innerHTML = "";

  let id = 0;

  groups.forEach((size, g) => {
    let div = document.createElement("div");
    div.className = "group";
    div.innerHTML = "<h3>Grupa " + (g+1) + "</h3>";

    for (let i=0;i<size;i++) {
      lifters.push({
        group: g,
        name: "",
        attempts: ["","",""]
      });

      div.innerHTML += `
        <input placeholder="Nazwisko" onchange="lifters[${id}].name=this.value">
        <input placeholder="1" onchange="lifters[${id}].attempts[0]=this.value">
        <input placeholder="2" onchange="lifters[${id}].attempts[1]=this.value">
        <input placeholder="3" onchange="lifters[${id}].attempts[2]=this.value">
        <br>
      `;
      id++;
    }

    container.appendChild(div);
  });

  renderPlatform();
}

// 🔥 KOLEJKA IPF
function getQueue() {
  let groupLifters = lifters.filter(l => l.group === currentGroup);

  return groupLifters
    .filter(l => l.attempts[currentRound] !== "")
    .sort((a,b) => parseFloat(a.attempts[currentRound]) - parseFloat(b.attempts[currentRound]));
}

function renderPlatform() {

  let queue = getQueue();

  if (queue.length === 0) {
    document.getElementById("platform").innerHTML =
      "<h2>Wpisz ciężary w grupie</h2>";
    return;
  }

  if (currentIndex >= queue.length) currentIndex = 0;

  let l = queue[currentIndex];

  document.getElementById("platform").innerHTML = `
    <h2>${l.name}</h2>
    <h2>Grupa ${currentGroup+1} / Próba ${currentRound+1}</h2>
    <h1>${l.attempts[currentRound]} kg</h1>
  `;

  localStorage.setItem("live", JSON.stringify({
    name: l.name,
    attempts: l.attempts,
    attemptNumber: currentRound
  }));
}

function nextMove() {

  let queue = getQueue();

  if (queue.length === 0) return;

  if (currentIndex < queue.length - 1) {
    currentIndex++;
  } else {

    // kolejna próba
    if (currentRound < 2) {
      currentRound++;
      currentIndex = 0;
    } else {

      // następna grupa
      if (currentGroup < groups.length - 1) {
        currentGroup++;
        currentRound = 0;
        currentIndex = 0;
      } else {
        document.getElementById("platform").innerHTML =
          "<h2>🏁 KONIEC ZAWODÓW</h2>";
        return;
      }
    }
  }

  renderPlatform();
}

function openTV() {
  window.open("tv.html", "_blank");
}

init();

</script>

</body>
</html>
