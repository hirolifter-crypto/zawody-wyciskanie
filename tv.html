<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>TV PRO</title>

<style>
body {
  background:black;
  color:white;
  text-align:center;
  font-family:Arial;
  margin:0;
}

#name { font-size:12vh; color:yellow; }
#club { font-size:5vh; }
#weight { font-size:20vh; color:red; }
#best { font-size:5vh; color:gold; }
#timer { font-size:15vh; font-weight:bold; }
</style>
</head>

<body>

<div id="name"></div>
<div id="club"></div>
<div id="weight"></div>
<div id="best"></div>
<div id="timer"></div>

<script>

function update(){

  let d = JSON.parse(localStorage.getItem("live"));
  let t = JSON.parse(localStorage.getItem("timer"));

  if(!d) return;

  document.getElementById("name").innerText = d.name || "";
  document.getElementById("club").innerText = d.club || "";
  document.getElementById("weight").innerText = (d.weight||"")+" kg";
  document.getElementById("best").innerText = "BEST: " + (d.best||0);

  let time = t ? t.value : 60;

  let color = "white";
  if(time <= 20) color = "red";
  else if(time <= 40) color = "yellow";

  document.getElementById("timer").innerText = time;
  document.getElementById("timer").style.color = color;
}

window.addEventListener("storage", update);
setInterval(update,200);

update();

</script>

</body>
</html>
