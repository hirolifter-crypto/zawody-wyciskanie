<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Zawody</title>

<style>
body {
  background:#111;
  color:#fff;
  font-family:Arial;
  text-align:center;
}

input {
  margin:5px;
  padding:10px;
  font-size:16px;
}

button {
  padding:10px;
  margin:5px;
}

.timer {
  font-size:40px;
  color:cyan;
}
</style>
</head>

<body>

<h1>PANEL</h1>

<input id="name" placeholder="Zawodnik"><br>
<input id="club" placeholder="Klub"><br>
<input id="weight" placeholder="Ciężar"><br>

<h2 class="timer" id="timer">0</h2>

<button onclick="start()">START</button>
<button onclick="next()">NASTĘPNY</button>
<button onclick="openTV()">📺 TV</button>

<script>

let timer = 0;
let interval = null;

function start(){
  clearInterval(interval);
  timer = 0;

  interval = setInterval(()=>{
    timer++;
    update();
    if(timer>=60) clearInterval(interval);
  },1000);
}

function next(){
  start();
}

function update(){
  let data = {
    name: document.getElementById("name").value,
    club: document.getElementById("club").value,
    weight: document.getElementById("weight").value,
    timer: timer
  };

  localStorage.setItem("live", JSON.stringify(data));
}

function openTV(){
  window.open("tv.html","_blank");
}

// 🔥 NIE MA AUTO STARTU
// 🔥 NIE MA AUTO TV

</script>

</body>
</html>
