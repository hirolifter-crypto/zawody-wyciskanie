<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>TV</title>

<style>
body {
  background:black;
  color:white;
  text-align:center;
  font-family:Arial;
}

#name { font-size:60px; color:yellow; }
#club { font-size:30px; }
#weight { font-size:80px; color:red; }
#timer { font-size:60px; color:cyan; }
</style>
</head>

<body>

<h1>NA POMOŚCIE</h1>

<div id="name"></div>
<div id="club"></div>
<div id="weight"></div>
<div id="timer"></div>

<script>

function update(){
  let data = JSON.parse(localStorage.getItem("live"));
  if(!data) return;

  document.getElementById("name").innerText = data.name || "";
  document.getElementById("club").innerText = data.club || "";
  document.getElementById("weight").innerText = (data.weight || "") + " kg";
  document.getElementById("timer").innerText = data.timer + " s";
}

// LIVE
window.addEventListener("storage", update);
setInterval(update,200);

update();

</script>

</body>
</html>
