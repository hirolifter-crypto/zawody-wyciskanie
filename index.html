<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Zawody – Wyciskanie Leżąc</title>

<style>
body { font-family: Arial; background:#111; color:#fff; text-align:center; }
h1 { color:#0f0; }

.container { display:flex; flex-wrap:wrap; justify-content:center; }
.group { border:1px solid #444; margin:10px; padding:10px; width:300px; }

input { margin:2px; padding:5px; }
button { margin:5px; padding:10px; font-size:14px; }

.tv {
  font-size: 60px;
  color: yellow;
}

.big {
  font-size: 100px;
  color: red;
}
</style>
</head>

<body>

<h1>ZAWODY – PANEL SĘDZIOWSKI</h1>

<button onclick="openTV()">📺 Otwórz ekran TV</button>
<button onclick="saveData()">💾 Zapisz</button>

<div class="container" id="groups"></div>

<h2>Pomost</h2>
<div id="platform"></div>

<button onclick="nextLifter()">➡️ Następny</button>
<button onclick="prevLifter()">⬅️ Cofnij</button>

<script>
let groups = [10,10,10,12];
let lifters = [];
let currentIndex = 0;

function init() {
  let container = document.getElementById("groups");
  container.innerHTML = "";
  lifters = [];

  let id = 0;

  groups.forEach((size, g) => {
    let div = document.createElement("div");
    div.className = "group";
    div.innerHTML = "<h3>Grupa " + (g+1) + "</h3>";

    for (let i=0;i<size;i++) {
      lifters.push({
        id: id,
        name: "",
        weightClass: "",
        attempts: ["","",""]
      });

      div.innerHTML += `
        <input placeholder="Nazwisko" onchange="updateName(${id}, this.value)">
        <input placeholder="Kategoria" onchange="updateCat(${id}, this.value)">
        <br>
      `;
      id++;
    }

    container.appendChild(div);
  });

  renderPlatform();
}

function updateName(id, val) { lifters[id].name = val; sync(); }
function updateCat(id, val) { lifters[id].weightClass = val; sync(); }

function renderPlatform() {
  let l = lifters[currentIndex];
  document.getElementById("platform").innerHTML = `
    <h3>${l.name || "BRAK"} (${l.weightClass || "-"})</h3>
    <div>
      1: <input onchange="setAttempt(0,this.value)" value="${l.attempts[0]}">
      2: <input onchange="setAttempt(1,this.value)" value="${l.attempts[1]}">
      3: <input onchange="setAttempt(2,this.value)" value="${l.attempts[2]}">
    </div>
    <p>Zawodnik ${currentIndex+1} / ${lifters.length}</p>
  `;
  sync();
}

function setAttempt(n, val) {
  lifters[currentIndex].attempts[n] = val;
  sync();
}

function nextLifter() {
  if (currentIndex < lifters.length-1) {
    currentIndex++;
    renderPlatform();
  }
}

function prevLifter() {
  if (currentIndex > 0) {
    currentIndex--;
    renderPlatform();
  }
}

function saveData() {
  localStorage.setItem("zawody", JSON.stringify(lifters));
  alert("Zapisano!");
}

function sync() {
  localStorage.setItem("live", JSON.stringify({
    lifter: lifters[currentIndex],
    index: currentIndex
  }));
}

// 📺 EKRAN TV
function openTV() {
  window.open("tv.html", "_blank");
}

  win.document.write(`
    <html>
    <body style="background:black; color:white; text-align:center;">
      <h1>NA POMOŚCIE</h1>
      <div id="name" class="tv"></div>
      <div id="weight" class="big"></div>

      <script>
        function update() {
          let data = JSON.parse(localStorage.getItem("live"));
          if (data) {
            document.getElementById("name").innerText = data.lifter.name;
            document.getElementById("weight").innerText = data.lifter.attempts[0] + " kg";
          }
        }
        setInterval(update, 500);
      <\/script>
    </body>
    </html>
  `);
}

init();
</script>

</body>
</html>
