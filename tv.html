<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>TV PRO</title>

<style>
body {
  background:black;
  color:white;
  font-family:Arial;
  margin:0;
  overflow:hidden;

  /* 🔥 wyśrodkowanie + niżej */
  display:flex;
  justify-content:center;
  align-items:flex-start;
  height:100vh;
}

/* kontener całego widoku */
#container {
  text-align:center;
  margin-top:8vh; /* 🔥 REGULUJESZ TUTAJ */
}

/* NAZWA */
#name {
  font-size:12vh;
  color:yellow;
  font-weight:bold;
}

/* klub */
#club {
  font-size:5vh;
}

/* ciężar */
#weight {
  font-size:20vh;
  color:red;
  font-weight:bold;
}

/* BEST */
#best {
  font-size:5vh;
  color:gold;
}

/* timer */
#timer {
  font-size:15vh;
  font-weight:bold;
}

/* kolejny */
#next {
  position:absolute;
  bottom:2vh;
  width:100%;
  font-size:5vh;
  color:lightblue;
}
</style>

</head>

<body>

<div id="container">
  <div id="name"></div>
  <div id="club"></div>
  <div id="weight"></div>
  <div id="best"></div>
  <div id="timer"></div>
</div>

<div id="next"></div>

<script>

function update(){

  let d = JSON.parse(localStorage.getItem("live"));
  let t = JSON.parse(localStorage.getItem("timer"));

  if(!d) return;

  document.getElementById("name").innerText = d.name || "";
  document.getElementById("club").innerText = d.club || "";
  document.getElementById("weight").innerText = (d.weight||"")+" kg";
  document.getElementById("best").innerText = "BEST: " + (d.best||0) + " kg";

  let time = t ? t.value : 60;

  let color = "white";
  if(time <= 20) color = "red";
  else if(time <= 40) color = "yellow";

  let timerEl = document.getElementById("timer");
  timerEl.innerText = time;
  timerEl.style.color = color;

  document.getElementById("next").innerText =
    d.next ? "W KOLEJCE: " + d.next : "";
}

window.addEventListener("storage", update);
setInterval(update,200);

update();

</script>

</body>
</html>
