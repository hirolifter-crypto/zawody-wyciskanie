<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>EKRAN TV</title>

<style>
body {
  background:black;
  color:white;
  text-align:center;
  font-family:Arial;
}

#current {
  font-size:80px;
  color:yellow;
}

#club {
  font-size:40px;
  color:lightgray;
}

#weight {
  font-size:120px;
  color:red;
}

#next {
  margin-top:40px;
  font-size:40px;
  color:lightgray;
}
</style>
</head>

<body>

<h1>NA POMOŚCIE</h1>

<div id="current">---</div>
<div id="club"></div>
<div id="weight">---</div>

<div id="next"></div>

<script>

function update() {
  try {
    let data = JSON.parse(localStorage.getItem("live"));
    if (!data) return;

    document.getElementById("current").innerText = data.name || "---";
    document.getElementById("club").innerText = data.club || "";
    document.getElementById("weight").innerText =
      (data.weight ? data.weight : "---") + " kg";

    if (data.nextName) {
      document.getElementById("next").innerText =
        "W KOLEJCE: " + data.nextName + " (" + data.nextWeight + " kg)";
    } else {
      document.getElementById("next").innerText = "";
    }

  } catch(e) {}
}

setInterval(update, 200);
update();

</script>

</body>
</html>
