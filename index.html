<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Zawody IPF PRO FINAL</title>

<style>
body { font-family: Arial; background:#111; color:#fff; text-align:center; }
.container { display:flex; flex-wrap:wrap; justify-content:center; }
.group { border:1px solid #444; margin:10px; padding:10px; width:380px; }
input, select { margin:2px; padding:5px; width:70px; }
button { margin:5px; padding:12px; font-size:16px; }
h2 { color:yellow; }
h3 { color:lightgray; }
.timer { color:cyan; font-size:28px; }
table { width:90%; margin:auto; border-collapse:collapse; }
td, th { border:1px solid #555; padding:6px; }
</style>
</head>

<body>

<h1>PANEL SĘDZIOWSKI – FINAL PRO</h1>

<button onclick="openTV()">📺 Ekran TV</button>
<button onclick="showResults()">📊 WYNIKI</button>

<div class="container" id="groups"></div>

<h2>Pomost</h2>
<div id="platform"></div>

<button onclick="nextMove()">➡️ Następny ruch</button>

<script>

let groups = [10,10,10,12];
let lifters = [];

let currentGroup = 0;
let currentIndex = 0;
let currentRound = 0;

// TIMER
let timer = 60;
let timerInterval = null;

function startTimer() {
  clearInterval(timerInterval);
  timer = 60;

  timerInterval = setInterval(() => {
    timer--;

    localStorage.setItem("timer", JSON.stringify({
      value: timer,
      time: Date.now()
    }));

    renderPlatform();

    if (timer <= 0) clearInterval(timerInterval);

  }, 1000);
}

// IPF GL (stabilny)
function ipfGL(total, bw, sex) {
  if (!bw || !total) return 0;
  bw = parseFloat(bw);
  total = parseFloat(total);

  return sex === "K"
    ? total * (500 / (bw + 25))
    : total * (500 / (bw + 40));
}

function bestLift(l) {
  return Math.max(...l.attempts.map(x => parseFloat(x)||0));
}

function init() {
  let container = document.getElementById("groups");
  let id = 0;

  groups.forEach((size, g) => {
    let div = document.createElement("div");
    div.className = "group";
    div.innerHTML = "<h3>Grupa " + (g+1) + "</h3>";

    for (let i=0;i<size;i++) {
      lifters.push({
        group:g, name:"", club:"",
        bw:"", sex:"M",
        attempts:["","",""]
      });

      div.innerHTML += `
        <input placeholder="Nazwisko" onchange="lifters[${id}].name=this.value">
        <input placeholder="Klub" onchange="lifters[${id}].club=this.value">
        <input placeholder="Waga" onchange="lifters[${id}].bw=this.value">
        <select onchange="lifters[${id}].sex=this.value">
          <option value="M">M</option>
          <option value="K">K</option>
        </select><br>

        <input placeholder="1" oninput="updateAttempt(${id},0,this.value)">
        <input placeholder="2" oninput="updateAttempt(${id},1,this.value)">
        <input placeholder="3" oninput="updateAttempt(${id},2,this.value)">
        <br>
      `;
      id++;
    }

    container.appendChild(div);
  });

  renderPlatform();
}

function updateAttempt(id,n,val){
  lifters[id].attempts[n]=val.trim();
  currentIndex=0;
  renderPlatform();
}

function getQueue(){
  return lifters
    .filter(l=>l.group===currentGroup && l.attempts[currentRound])
    .sort((a,b)=>a.attempts[currentRound]-b.attempts[currentRound]);
}

function renderPlatform(){

  let q=getQueue();
  if(!q.length){
    document.getElementById("platform").innerHTML="<h2>Wpisz ciężary</h2>";
    return;
  }

  if(currentIndex>=q.length) currentIndex=0;

  let l=q[currentIndex];
  let next=q[currentIndex+1];

  document.getElementById("platform").innerHTML=`
    <h2>${l.name}</h2>
    <h3>${l.club}</h3>
    <h2>${l.attempts[currentRound]} kg</h2>
    <div class="timer">CZAS: ${timer}s</div>
  `;

  localStorage.setItem("live", JSON.stringify({
    name:l.name,
    club:l.club,
    weight:l.attempts[currentRound],
    nextName:next?next.name:"",
    nextWeight:next?next.attempts[currentRound]:"",
    time:Date.now()
  }));
}

function nextMove(){

  let q=getQueue();
  if(!q.length) return;

  if(currentIndex<q.length-1) currentIndex++;
  else{
    if(currentRound<2){currentRound++; currentIndex=0;}
    else{
      if(currentGroup<groups.length-1){
        currentGroup++; currentRound=0; currentIndex=0;
      }else{
        document.getElementById("platform").innerHTML="<h2>KONIEC</h2>";
        return;
      }
    }
  }

  startTimer();
  renderPlatform();
}

function showResults(){

  let results = lifters.map(l=>{
    let best = bestLift(l);
    let pts = ipfGL(best,l.bw,l.sex);
    return {...l,best,pts};
  });

  results=results.filter(l=>l.best>0);
  results.sort((a,b)=>b.pts-a.pts);

  let html="<h2>WYNIKI</h2><table><tr><th>#</th><th>Nazwisko</th><th>Kg</th><th>BW</th><th>Pts</th></tr>";

  results.forEach((l,i)=>{
    html+=`<tr>
      <td>${i+1}</td>
      <td>${l.name}</td>
      <td>${l.best}</td>
      <td>${l.bw}</td>
      <td>${l.pts.toFixed(2)}</td>
    </tr>`;
  });

  html+="</table>";
  document.getElementById("platform").innerHTML=html;
}

function openTV(){
  window.open("tv.html","_blank");
}

init();

</script>

</body>
</html>
