<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>EKRAN TV</title>

<style>
body {
  background:black;
  color:white;
  text-align:center;
  font-family:Arial;
}

h1 { font-size:60px; }

#name {
  font-size:80px;
  color:yellow;
}

#weight {
  font-size:120px;
  color:red;
}
</style>
</head>

<body>

<h1>NA POMOŚCIE</h1>
<div id="name">BRAK</div>
<div id="weight">---</div>

<script>
window.addEventListener("storage", function(e) {
  if (e.key === "live") {
    update();
  }
});

function update() {
  try {
    let data = JSON.parse(localStorage.getItem("live"));

    if (!data) return;

    document.getElementById("name").innerText = data.name || "BRAK";
    document.getElementById("weight").innerText =
      (data.attempts && data.attempts[0] ? data.attempts[0] : "---") + " kg";

  } catch (e) {
    console.log("Błąd danych", e);
  }
}

// pierwsze odczytanie
update();
</script>

</body>
</html>
