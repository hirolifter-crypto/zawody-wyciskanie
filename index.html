<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Zawody FINAL</title>

<style>
body { font-family: Arial; background:#111; color:#fff; text-align:center; }
.container { display:flex; flex-wrap:wrap; justify-content:center; }
.group { border:1px solid #444; margin:10px; padding:10px; width:420px; }
input { margin:2px; padding:5px; width:65px; }
button { margin:2px; padding:6px; }
.ok { background:green; }
.fail { background:red; }
.timer { color:cyan; font-size:28px; }
table { width:90%; margin:auto; border-collapse:collapse; }
td, th { border:1px solid #555; padding:6px; }
</style>
</head>

<body>

<h1>PANEL SĘDZIOWSKI</h1>

<button onclick="openTV()">📺 TV</button>
<button onclick="showResults()">📊 WYNIKI</button>
<button onclick="resetAll()">🗑 RESET</button>
<button onclick="exportData()">💾 ZAPISZ</button>
<input type="file" onchange="importData(event)">

<div class="container" id="groups"></div>

<h2>Pomost</h2>
<div id="platform"></div>

<button onclick="nextMove()">➡️ Następny ruch</button>

<div id="results"></div>

<script>

let groups = [10,10,10,12];
let lifters = [];

let currentGroup = 0;
let currentIndex = 0;
let currentRound = 0;

let timer = 60;
let timerInterval = null;

// ===== POMOCNICZE =====
function toNum(val){
  return parseFloat((val || "").toString().replace(",", ".")) || 0;
}

// ===== SAVE / LOAD =====
function saveAll(){
  localStorage.setItem("zawody", JSON.stringify({
    lifters,currentGroup,currentIndex,currentRound
  }));
}

function loadAll(){
  let data = JSON.parse(localStorage.getItem("zawody"));
  if(data){
    lifters = data.lifters || [];
    currentGroup = data.currentGroup || 0;
    currentIndex = data.currentIndex || 0;
    currentRound = data.currentRound || 0;
  }
}

function resetAll(){
  localStorage.clear();
  location.reload();
}

// ===== BACKUP =====
function exportData(){
  let blob = new Blob([JSON.stringify({
    lifters,currentGroup,currentIndex,currentRound
  })], {type:"application/json"});

  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "backup.json";
  a.click();
}

function importData(e){
  let reader = new FileReader();
  reader.onload = function(){
    let d = JSON.parse(reader.result);
    lifters = d.lifters || [];
    currentGroup = d.currentGroup || 0;
    currentIndex = d.currentIndex || 0;
    currentRound = d.currentRound || 0;
    saveAll();
    location.reload();
  };
  reader.readAsText(e.target.files[0]);
}

// ===== TIMER =====
function startTimer(){
  clearInterval(timerInterval);
  timer = 60;

  timerInterval = setInterval(()=>{
    timer--;
    localStorage.setItem("timer", JSON.stringify({value:timer}));
    renderPlatform();
    if(timer<=0) clearInterval(timerInterval);
  },1000);
}

// ===== BEST =====
function bestLift(l){
  return Math.max(...l.attempts.map(a => a.ok ? toNum(a.weight) : 0));
}

// ===== INIT =====
function init(){

  loadAll();

  let c=document.getElementById("groups");
  c.innerHTML="";

  let id=0;

  groups.forEach((size,g)=>{
    let div=document.createElement("div");
    div.className="group";
    div.innerHTML="<h3>Grupa "+(g+1)+"</h3>";

    for(let i=0;i<size;i++){

      if(!lifters[id]){
        lifters.push({
          group:g,name:"",club:"",
          category:"",record:"",
          attempts:[
            {weight:"",ok:null},
            {weight:"",ok:null},
            {weight:"",ok:null}
          ]
        });
      }

      let l = lifters[id];

      div.innerHTML+=`
        <input value="${l.name}" placeholder="Nazwisko"
        onchange="lifters[${id}].name=this.value;saveAll()">

        <input value="${l.club}" placeholder="Klub"
        onchange="lifters[${id}].club=this.value;saveAll()">

        <input value="${l.category}" placeholder="Kat."
        onchange="lifters[${id}].category=this.value;saveAll()">

        <input value="${l.record}" placeholder="Rekord"
        onchange="lifters[${id}].record=this.value;saveAll()"><br>

        ${renderAttempt(id,0)}
        ${renderAttempt(id,1)}
        ${renderAttempt(id,2)}
        <br>
      `;

      id++;
    }

    c.appendChild(div);
  });

  renderPlatform();
}

// ===== PRÓBY =====
function renderAttempt(id,n){
  let a = lifters[id].attempts[n] || {weight:"", ok:null};

  return `
    <input value="${a.weight}" placeholder="${n+1}"
    oninput="setAttempt(${id},${n},this.value)">

    <button class="${a.ok===true?'ok':''}"
    onclick="setResult(${id},${n},true)">✔</button>

    <button class="${a.ok===false?'fail':''}"
    onclick="setResult(${id},${n},false)">❌</button>
  `;
}

function setAttempt(id,n,val){
  lifters[id].attempts[n].weight = val;
  saveAll();
  renderPlatform();
}

function setResult(id,n,res){
  lifters[id].attempts[n].ok = res;
  saveAll();
  init();
}

// ===== KOLEJKA =====
function getQueue(){
  return lifters
    .filter(l =>
      l.group === currentGroup &&
      l.attempts[currentRound] &&
      l.attempts[currentRound].weight
    )
    .sort((a,b)=>
      toNum(a.attempts[currentRound].weight) -
      toNum(b.attempts[currentRound].weight)
    );
}

// ===== PLATFORM =====
function renderPlatform(){

  let q=getQueue();

  if(!q.length){
    document.getElementById("platform").innerHTML="Wpisz ciężary";
    return;
  }

  if(currentIndex>=q.length) currentIndex=0;

  let l=q[currentIndex];
  let next=(currentIndex+1<q.length)?q[currentIndex+1]:null;

  document.getElementById("platform").innerHTML=`
    <h2>${l.name}</h2>
    <h3>${l.club}</h3>
    <h3>${l.category}</h3>
    <h1>${l.attempts[currentRound].weight} kg</h1>
    <div class="timer">${timer}s</div>
    <h3>REKORD: ${l.record}</h3>
  `;

  localStorage.setItem("live", JSON.stringify({
    name:l.name,
    club:l.club,
    category:l.category,
    record:l.record,
    weight:l.attempts[currentRound].weight,
    nextName:next?next.name:"",
    nextWeight:next?next.attempts[currentRound].weight:""
  }));
}

// ===== NEXT =====
function nextMove(){
  let q=getQueue();
  if(!q.length) return;

  if(currentIndex < q.length-1){
    currentIndex++;
  } else {
    if(currentRound < 2){
      currentRound++;
      currentIndex = 0;
    } else {
      if(currentGroup < groups.length-1){
        currentGroup++;
        currentRound = 0;
        currentIndex = 0;
      } else {
        document.getElementById("platform").innerHTML="<h2>KONIEC</h2>";
        return;
      }
    }
  }

  saveAll();
  startTimer();
  renderPlatform();
}

// ===== WYNIKI =====
function showResults(){

  let res = lifters.map(l=>{
    let best = bestLift(l);
    let rec = toNum(l.record);
    return {
      ...l,
      best,
      improve: best - rec,
      newRec: best > rec
    };
  }).filter(l=>l.best>0);

  res.sort((a,b)=>b.improve - a.improve);

  let html="<h2>WYNIKI</h2><table>";
  html+="<tr><th>#</th><th>Nazwisko</th><th>Kg</th><th>+/-</th><th>Rekord</th></tr>";

  res.forEach((l,i)=>{
    html+=`<tr>
      <td>${i+1}</td>
      <td>${l.name}</td>
      <td>${l.best}</td>
      <td>${l.improve>=0?"+":""}${l.improve}</td>
      <td>${l.newRec?"TAK":""}</td>
    </tr>`;
  });

  html+="</table>";
  document.getElementById("results").innerHTML=html;
}

// ===== TV =====
function openTV(){
  window.open("./tv.html","_blank");
}

init();

</script>

</body>
</html>
