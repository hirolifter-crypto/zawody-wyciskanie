<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>TV</title>

<style>
body {
  background:black;
  color:white;
  text-align:center;
  font-family:Arial;
}

#name{font-size:10vh;color:yellow;}
#weight{font-size:14vh;color:red;}
#timer{font-size:10vh;color:cyan;}
#next{font-size:5vh;color:lightblue;}
</style>
</head>

<body>

<h1>NA POMOŚCIE</h1>

<div id="name"></div>
<div id="weight"></div>
<div id="timer"></div>
<div id="next"></div>

<script>

function update(){

  let data = JSON.parse(localStorage.getItem("live"));
  let tData = JSON.parse(localStorage.getItem("timer"));

  if(!data) return;

  document.getElementById("name").innerText = data.name || "";
  document.getElementById("weight").innerText = (data.weight||"")+" kg";

  // 🔥 TIMER DZIAŁA
  let t = tData ? tData.value : 0;
  document.getElementById("timer").innerText = "CZAS: " + t + "s";

  document.getElementById("next").innerText =
    data.nextName ? "W KOLEJCE: "+data.nextName : "";
}

// 🔥 LIVE
window.addEventListener("storage", update);

// 🔥 backup
setInterval(update,200);

update();

</script>

</body>
</html>
