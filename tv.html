<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>TV</title>

<style>
body {background:black;color:white;text-align:center;font-family:Arial;margin:0;}
.container{display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh;}

#current{font-size:10vh;color:yellow;}
#club{font-size:4vh;}
#category{font-size:4vh;}
#weight{font-size:14vh;color:red;}
#timer{font-size:10vh;color:cyan;}
#record{font-size:4vh;color:orange;}
#newrecord{font-size:6vh;color:lime;font-weight:bold;}
#next{font-size:4vh;margin-top:4vh;}
</style>
</head>

<body>

<div class="container">
<h1>NA POMOŚCIE</h1>

<div id="current"></div>
<div id="club"></div>
<div id="category"></div>
<div id="weight"></div>
<div id="timer"></div>
<div id="record"></div>
<div id="newrecord"></div>
<div id="next"></div>

</div>

<script>

function toNum(val){
  return parseFloat((val || "").toString().replace(",", ".")) || 0;
}

function update(){

  let data = JSON.parse(localStorage.getItem("live"));
  let tData = JSON.parse(localStorage.getItem("timer"));

  if(!data) return;

  document.getElementById("current").innerText=data.name||"";
  document.getElementById("club").innerText=data.club||"";
  document.getElementById("category").innerText=data.category||"";
  document.getElementById("weight").innerText=(data.weight||"")+" kg";

  let t=tData?tData.value:"";
  document.getElementById("timer").innerText="CZAS: "+t+"s";

  document.getElementById("record").innerText =
    data.record ? "REKORD: "+data.record+" kg" : "";

  let rec = toNum(data.record);
  let w = toNum(data.weight);

  document.getElementById("newrecord").innerText =
    (rec>0 && w>rec) ? "NOWY REKORD!" : "";

  document.getElementById("next").innerText =
    (data.nextName && data.nextWeight)
      ? "W KOLEJCE: "+data.nextName+" ("+data.nextWeight+" kg)"
      : "";
}

setInterval(update,200);
update();

</script>

</body>
</html>
