<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Zawody PRO FINAL</title>

<style>
body { background:#111; color:#fff; font-family:Arial; text-align:center; }
.container { display:flex; flex-wrap:wrap; justify-content:center; }
.group { border:1px solid #444; margin:10px; padding:10px; width:420px; }

input { margin:2px; padding:5px; width:80px; }
button { margin:2px; padding:6px; }

.ok { background:green; }
.fail { background:red; }

.timer { font-size:32px; }
.best { color:gold; }
</style>
</head>

<body>

<h1>PANEL SĘDZIOWSKI</h1>

<button onclick="openTV()">📺 TV</button>
<button onclick="clearAttempts()">🧹 WYCZYŚĆ PRÓBY</button>

<div class="container" id="groups"></div>

<h2>Pomost</h2>
<div id="platform"></div>

<button onclick="nextMove()">➡️ Następny</button>

<script>

// ===== DANE =====
let groupSizes = [10,10,10,12];
let lifters = [];

let currentGroup = 0;
let currentIndex = 0;
let currentRound = 0;

let timer = 60;

// ===== 🔥 SYNC INPUTÓW =====
function syncInputs(){

  let inputs = document.querySelectorAll("input");

  inputs.forEach((inp)=>{
    let attr = inp.getAttribute("oninput");

    if(attr && attr.includes("setW")){
      let match = attr.match(/setW\((\d+),(\d+)/);

      if(match){
        let i = parseInt(match[1]);
        let n = parseInt(match[2]);

        lifters[i].attempts[n].w = inp.value.trim();
      }
    }
  });
}

// ===== INIT =====
function init(){

  let c = document.getElementById("groups");
  c.innerHTML = "";

  if(lifters.length === 0){
    groupSizes.forEach((size,g)=>{
      for(let i=0;i<size;i++){
        lifters.push({
          group:g,
          name:"",
          club:"",
          category:"",
          record:0,
          attempts:[
            {w:"",ok:null},
            {w:"",ok:null},
            {w:"",ok:null}
          ]
        });
      }
    });
  }

  groupSizes.forEach((size,g)=>{

    let div = document.createElement("div");
    div.className = "group";
    div.innerHTML = "<h3>Grupa "+(g+1)+"</h3>";

    lifters
      .map((l,i)=>({l,i}))
      .filter(x => x.l.group === g)
      .forEach(x=>{

        let l = x.l;
        let i = x.i;

        div.innerHTML += `
          <input value="${l.name}" placeholder="Zawodnik"
          onchange="lifters[${i}].name=this.value">

          <input value="${l.club}" placeholder="Klub"
          onchange="lifters[${i}].club=this.value">

          <input value="${l.category || ''}" placeholder="Kategoria"
          onchange="lifters[${i}].category=this.value">

          <input value="${l.record || ''}" placeholder="Rekord"
          onchange="lifters[${i}].record=parseFloat(this.value)||0">

          ${attemptUI(i,0)}
          ${attemptUI(i,1)}
          ${attemptUI(i,2)}<br>
        `;
      });

    c.appendChild(div);
  });

  renderPlatform();
}

// ===== PRÓBY =====
function attemptUI(i,n){
  let a = lifters[i].attempts[n];

  return `
    <input value="${a.w}" oninput="setW(${i},${n},this.value)">
    <button class="${a.ok===true?'ok':''}" onclick="setR(${i},${n},true)">✔</button>
    <button class="${a.ok===false?'fail':''}" onclick="setR(${i},${n},false)">❌</button>
  `;
}

function setW(i,n,v){
  lifters[i].attempts[n].w = v.trim();
}

function setR(i,n,r){
  lifters[i].attempts[n].ok = r;
  init();
}

// ===== KOLEJKA =====
function queue(){
  return lifters
    .filter(l => {
      if(l.group !== currentGroup) return false;
      let w = parseFloat(l.attempts[currentRound].w);
      return !isNaN(w) && w > 0;
    })
    .sort((a,b)=>{
      return parseFloat(a.attempts[currentRound].w) - parseFloat(b.attempts[currentRound].w);
    });
}

// ===== PLATFORM =====
function renderPlatform(){

  let q = queue();

  if(!q.length){
    document.getElementById("platform").innerHTML = "👉 Wpisz ciężary zawodnikom";
    return;
  }

  let l = q[currentIndex] || q[0];
  let next = q[currentIndex+1];

  let best = Math.max(...l.attempts.map(a=>a.ok?parseFloat(a.w)||0:0));

  let oldRecord = parseFloat(l.record)||0;
  let weight = parseFloat(l.attempts[currentRound].w)||0;

  let attemptRecord = weight > oldRecord;
  let isRecord = l.attempts[currentRound].ok && weight > oldRecord;

  let recordText = "";
  if(isRecord){
    recordText = "<h2 style='color:lime;'>🔥 NOWY REKORD!</h2>";
  } else if(attemptRecord){
    recordText = "<h3>PRÓBA NA REKORD</h3>";
  }

  document.getElementById("platform").innerHTML = `
    <h2>${l.name}</h2>
    <h3>${l.club}</h3>
    <h3>${l.category||''}</h3>
    <h1>${weight} kg</h1>

    ${recordText}

    <div>BEST: ${best}</div>

    <hr>

    <h3>NASTĘPNY:</h3>
    <h3>${next ? next.name : '-'}</h3>
  `;

  localStorage.setItem("live", JSON.stringify({
    name:l.name,
    club:l.club,
    category:l.category||"",
    weight:weight,
    best:best,
    attemptRecord:attemptRecord,
    record:isRecord
  }));
}

// ===== NEXT =====
function nextMove(){

  syncInputs(); // 🔥 KLUCZOWE

  let q = queue();

  if(!q.length){
    alert("Najpierw wpisz ciężary!");
    return;
  }

  if(currentIndex < q.length-1){
    currentIndex++;
  } else {
    if(currentRound < 2){
      currentRound++;
      currentIndex=0;
    }
  }

  renderPlatform();
}

// ===== FUNKCJE =====
function clearAttempts(){
  lifters.forEach(l=>{
    l.attempts=[{w:"",ok:null},{w:"",ok:null},{w:"",ok:null}];
  });
  init();
}

// ===== TV =====
function openTV(){
  window.open("tv.html","_blank");
}

init();

</script>
</body>
</html>
