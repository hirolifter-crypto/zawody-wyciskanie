<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>TV FIX</title>

<style>
body {
  background:black;
  color:white;
  font-family:Arial;
  margin:0;
  overflow:hidden;

  display:flex;
  justify-content:center;
  align-items:center; /* 🔥 środek pionowy */
  height:100vh;
}

/* 🔥 CAŁY BLOK */
#wrap {
  text-align:center;
  transform: translateY(5vh); /* 🔥 jeszcze niżej */
}

/* 🔥 NAZWA */
#name {
  font-size:14vh;
  color:yellow;
  font-weight:bold;
}

/* 🔥 KLUB */
#club {
  font-size:6vh;
}

/* 🔥 CIĘŻAR */
#weight {
  font-size:26vh;
  color:red;
  font-weight:bold;
}

/* BEST */
#best {
  font-size:6vh;
  color:gold;
}

/* 🔥 TIMER */
#timer {
  font-size:18vh;
  font-weight:bold;
}
</style>

</head>

<body>

<div id="wrap">
  <div id="name"></div>
  <div id="club"></div>
  <div id="weight"></div>
  <div id="best"></div>
  <div id="timer"></div>
</div>

<script>

function update(){

  let d = JSON.parse(localStorage.getItem("live"));
  let t = JSON.parse(localStorage.getItem("timer"));

  if(!d) return;

  document.getElementById("name").innerText = d.name || "";
  document.getElementById("club").innerText = d.club || "";
  document.getElementById("weight").innerText = (d.weight||"")+" kg";
  document.getElementById("best").innerText = "BEST: " + (d.best||0);

  let time = t ? t.value : 60;

  let color = "white";
  if(time <= 20) color = "red";
  else if(time <= 40) color = "yellow";

  let timerEl = document.getElementById("timer");
  timerEl.innerText = time;
  timerEl.style.color = color;
}

window.addEventListener("storage", update);
setInterval(update,200);

update();

</script>

</body>
</html>
