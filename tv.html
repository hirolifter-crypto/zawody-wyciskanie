<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>EKRAN TV</title>

<style>
body {
  background:black;
  color:white;
  text-align:center;
  font-family:Arial;
}

#current {
  font-size:80px;
  color:yellow;
}

#weight {
  font-size:120px;
  color:red;
}

#next {
  margin-top:40px;
  font-size:40px;
  color:lightgray;
}
</style>
</head>

<body>

<h1>NA POMOŚCIE</h1>

<div id="current">---</div>
<div id="weight">---</div>

<div id="next"></div>

<script>
function update() {
  let data = JSON.parse(localStorage.getItem("live"));
  if (!data) return;

  document.getElementById("current").innerText = data.name || "---";
  document.getElementById("weight").innerText = (data.weight || "---") + " kg";

  if (data.nextName) {
    document.getElementById("next").innerText =
      "W KOLEJCE: " + data.nextName + " (" + data.nextWeight + " kg)";
  } else {
    document.getElementById("next").innerText = "";
  }
}

setInterval(update, 300);
</script>

</body>
</html>
