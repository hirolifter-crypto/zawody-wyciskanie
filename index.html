<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Zawody PRO FINAL</title>

<style>
body { background:#111; color:#fff; font-family:Arial; text-align:center; }
.container { display:flex; flex-wrap:wrap; justify-content:center; }
.group { border:1px solid #444; margin:10px; padding:10px; width:420px; }

input { margin:2px; padding:5px; width:80px; }
button { margin:2px; padding:6px; }

.ok { background:green; }
.fail { background:red; }

.timer { font-size:32px; }
.best { color:gold; }
</style>
</head>

<body>

<h1>PANEL SĘDZIOWSKI</h1>

<button onclick="openTV()">📺 TV</button>
<button onclick="clearAttempts()">🧹 WYCZYŚĆ PRÓBY</button>
<button onclick="exportData()">💾 ZAPISZ</button>
<input type="file" onchange="importData(event)">
<button onclick="resetAll()">🗑 RESET</button>

<div class="container" id="groups"></div>

<h2>Pomost</h2>
<div id="platform"></div>

<button onclick="nextMove()">➡️ Następny</button>

<script>

// ===== DANE =====
let groupSizes = [10,10,10,12];
let lifters = [];

let currentGroup = 0;
let currentIndex = 0;
let currentRound = 0;

let timer = 60;
let interval = null;

// PRZERWA
let breakTime = 0;
let breakInterval = null;
let isBreak = false;

// ===== TIMER =====
function startTimer(){
  clearInterval(interval);
  timer = 60;

  interval = setInterval(()=>{
    timer--;
    localStorage.setItem("timer", JSON.stringify({value:timer}));
    renderPlatform();
    if(timer <= 0) clearInterval(interval);
  },1000);
}

// ===== PRZERWA =====
function startBreak(){
  isBreak = true;
  breakTime = 420;

  clearInterval(breakInterval);

  breakInterval = setInterval(()=>{

    let min = Math.floor(breakTime/60);
    let sec = (breakTime%60).toString().padStart(2,'0');

    document.getElementById("platform").innerHTML = `
      <h1>PRZERWA</h1>
      <h2>KOLEJNA GRUPA: ${currentGroup+2}</h2>
      <h1>${min}:${sec}</h1>
    `;

    localStorage.setItem("live", JSON.stringify({
      break:true,
      nextGroup: currentGroup+2,
      breakTime: breakTime
    }));

    breakTime--;

    if(breakTime < 0){
      clearInterval(breakInterval);
      isBreak = false;

      currentGroup++;
      currentRound = 0;
      currentIndex = 0;

      save();
      renderPlatform();
    }

  },1000);
}

// ===== BEST =====
function bestLift(l){
  let vals = l.attempts
    .filter(a => a.ok === true)
    .map(a => parseFloat(a.w) || 0);
  return vals.length ? Math.max(...vals) : 0;
}

// ===== SAVE / LOAD =====
function save(){
  localStorage.setItem("data", JSON.stringify({
    lifters,currentGroup,currentIndex,currentRound
  }));
}

function load(){
  let d = JSON.parse(localStorage.getItem("data"));
  if(d){
    lifters = d.lifters || [];
    currentGroup = d.currentGroup || 0;
    currentIndex = d.currentIndex || 0;
    currentRound = d.currentRound || 0;
  }
}

// ===== INIT =====
function init(){

  load();

  let c = document.getElementById("groups");
  c.innerHTML = "";

  if(lifters.length === 0){
    groupSizes.forEach((size,g)=>{
      for(let i=0;i<size;i++){
        lifters.push({
          group:g,
          name:"",
          club:"",
          category:"",
          record:0,
          attempts:[
            {w:"",ok:null},
            {w:"",ok:null},
            {w:"",ok:null}
          ]
        });
      }
    });
  }

  groupSizes.forEach((size,g)=>{

    let div = document.createElement("div");
    div.className = "group";
    div.innerHTML = "<h3>Grupa "+(g+1)+"</h3>";

    lifters
      .map((l,i)=>({l,i}))
      .filter(x => x.l.group === g)
      .forEach(x=>{

        let l = x.l;
        let i = x.i;

        div.innerHTML += `
          <input value="${l.name}" placeholder="Zawodnik"
          onchange="lifters[${i}].name=this.value;save();renderPlatform()">

          <input value="${l.club}" placeholder="Klub"
          onchange="lifters[${i}].club=this.value;save();renderPlatform()">

          <input value="${l.category || ''}" placeholder="Kategoria"
          onchange="lifters[${i}].category=this.value;save()">

          <input value="${l.record || ''}" placeholder="Rekord"
          onchange="lifters[${i}].record=parseFloat(this.value)||0;save()">

          ${attemptUI(i,0)}
          ${attemptUI(i,1)}
          ${attemptUI(i,2)}<br>
        `;
      });

    c.appendChild(div);
  });

  renderPlatform();
}

// ===== PRÓBY =====
function attemptUI(i,n){
  let a = lifters[i].attempts[n];

  return `
    <input value="${a.w}" oninput="setW(${i},${n},this.value)">
    <button class="${a.ok===true?'ok':''}" onclick="setR(${i},${n},true)">✔</button>
    <button class="${a.ok===false?'fail':''}" onclick="setR(${i},${n},false)">❌</button>
  `;
}

function setW(i,n,v){ lifters[i].attempts[n].w = v; save(); renderPlatform(); }
function setR(i,n,r){ lifters[i].attempts[n].ok = r; save(); init(); }

// ===== KOLEJKA =====
function toNum(v){return parseFloat(v)||0;}

function queue(){
  return lifters
    .filter(l => l.group===currentGroup && l.attempts[currentRound].w)
    .sort((a,b)=>toNum(a.attempts[currentRound].w)-toNum(b.attempts[currentRound].w));
}

// ===== PLATFORM =====
function renderPlatform(){

  if(isBreak) return;

  let q = queue();

  if(!q.length){
    document.getElementById("platform").innerHTML = "👉 Wpisz ciężary zawodnikom";
    return;
  }

  let l = q[currentIndex] || q[0];
  let next = q[currentIndex + 1];

  let best = bestLift(l);

  let oldRecord = parseFloat(l.record) || 0;
  let weight = parseFloat(l.attempts[currentRound].w) || 0;

  let attemptRecord = weight > oldRecord;
  let isRecord = (l.attempts[currentRound].ok === true && weight > oldRecord);

  let recordText = "";
  if(isRecord){
    recordText = "<h2 style='color:lime;'>🔥 NOWY REKORD!</h2>";
  } else if(attemptRecord){
    recordText = "<h3>PRÓBA NA REKORD</h3>";
  }

  document.getElementById("platform").innerHTML = `
    <h2>${l.name}</h2>
    <h3>${l.club}</h3>
    <h3>${l.category || ''}</h3>
    <h1>${weight} kg</h1>

    ${recordText}

    <div>BEST: ${best}</div>
    <div>${timer}s</div>

    <hr>

    <h3>NASTĘPNY:</h3>
    <h3>${next ? next.name : '-'}</h3>
  `;

  localStorage.setItem("live", JSON.stringify({
    name:l.name,
    club:l.club,
    category:l.category || "",
    weight:weight,
    best:best,
    attemptRecord:attemptRecord,
    record:isRecord
  }));
}

// ===== NEXT =====
function nextMove(){

  if(isBreak) return;

  let q = queue();

  if(!q.length){
    alert("Najpierw wpisz ciężary!");
    return;
  }

  if(currentIndex < q.length-1){
    currentIndex++;
  } else {
    if(currentRound < 2){
      currentRound++;
      currentIndex=0;
    } else {
      if(currentGroup < groupSizes.length-1){
        startBreak();
        return;
      }
    }
  }

  save();
  startTimer();
  renderPlatform();
}

// ===== FUNKCJE =====
function clearAttempts(){
  lifters.forEach(l=>{
    l.attempts = [{w:"",ok:null},{w:"",ok:null},{w:"",ok:null}];
  });
  save();
  init();
}

function exportData(){
  let blob = new Blob([JSON.stringify({lifters})]);
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download="backup.json";
  a.click();
}

function importData(e){
  let r = new FileReader();
  r.onload = ()=>{
    let d = JSON.parse(r.result);
    lifters = d.lifters || [];
    save();
    location.reload();
  };
  r.readAsText(e.target.files[0]);
}

function resetAll(){ localStorage.clear(); location.reload(); }

// ===== TV =====
function openTV(){ window.open("tv.html","_blank"); }

setTimeout(openTV,1000);

init();

</script>
</body>
</html>
