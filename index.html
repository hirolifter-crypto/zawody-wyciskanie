<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Zawody</title>

<style>
body { font-family: Arial; background:#111; color:#fff; text-align:center; }
.container { display:flex; flex-wrap:wrap; justify-content:center; }
.group { border:1px solid #444; margin:10px; padding:10px; width:300px; }
input { margin:2px; padding:5px; }
button { margin:5px; padding:12px; font-size:16px; }
h2 { color:yellow; }
.big { font-size:22px; color:#0f0; }
</style>
</head>

<body>

<h1>PANEL SĘDZIOWSKI</h1>

<button onclick="openTV()">📺 Ekran TV</button>

<div class="container" id="groups"></div>

<h2>Pomost</h2>
<div id="platform"></div>

<div class="big" id="info"></div>

<button onclick="nextMove()">➡️ Następny ruch</button>

<script>
let groups = [10,10,10,12];
let lifters = [];

let currentGroup = 0;
let currentIndex = 0;
let currentRound = 1;

function init() {
  let container = document.getElementById("groups");
  container.innerHTML = "";
  lifters = [];

  let id = 0;

  groups.forEach((size, g) => {
    let div = document.createElement("div");
    div.className = "group";
    div.innerHTML = "<h3>Grupa " + (g+1) + "</h3>";

    for (let i=0;i<size;i++) {
      lifters.push({
        group: g,
        name: "",
        category: "",
        attempts: ["","",""]
      });

      div.innerHTML += `
        <input placeholder="Nazwisko" onchange="lifters[${id}].name=this.value">
        <input placeholder="Kat." onchange="lifters[${id}].category=this.value">
        <br>
      `;
      id++;
    }

    container.appendChild(div);
  });

  renderPlatform();
}

function getGroupLifters() {
  return lifters.filter(l => l.group === currentGroup);
}

function renderPlatform() {
  let groupLifters = getGroupLifters();
  let l = groupLifters[currentIndex];
  let attempt = currentRound - 1;

  document.getElementById("platform").innerHTML = `
    <h3>${l.name || "BRAK"} (${l.category || "-"})</h3>
    <h2>Grupa ${currentGroup+1} / Runda ${currentRound} / Próba ${attempt+1}</h2>

    <br>

    1: <input value="${l.attempts[0]}" onchange="setAttempt(0,this.value)">
    2: <input value="${l.attempts[1]}" onchange="setAttempt(1,this.value)">
    3: <input value="${l.attempts[2]}" onchange="setAttempt(2,this.value)">
  `;

  document.getElementById("info").innerText =
    "Zawodnik " + (currentIndex+1) + " / " + groupLifters.length;

  sync(l, attempt);
}

function setAttempt(n, val) {
  let groupLifters = getGroupLifters();
  groupLifters[currentIndex].attempts[n] = val;
  renderPlatform();
}

function nextMove() {

  let groupLifters = getGroupLifters();

  if (currentIndex < groupLifters.length - 1) {
    currentIndex++;
  } else {

    // koniec rundy w grupie
    if (currentRound < 3) {
      currentRound++;
      currentIndex = 0;
    } else {
      // koniec grupy
      if (currentGroup < groups.length - 1) {
        currentGroup++;
        currentRound = 1;
        currentIndex = 0;
      } else {
        document.getElementById("platform").innerHTML =
          "<h2>🏁 KONIEC ZAWODÓW</h2>";
        return;
      }
    }
  }

  renderPlatform();
}

function sync(l, attempt) {
  localStorage.setItem("live", JSON.stringify({
    name: l.name,
    attempts: l.attempts,
    attemptNumber: attempt
  }));
}

function openTV() {
  window.open("tv.html", "_blank");
}

init();
</script>

</body>
</html>
