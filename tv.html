<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>TV PRO MAX</title>

<style>
body {
  background:black;
  color:white;
  text-align:center;
  font-family:Arial;
  margin:0;
  overflow:hidden;
}

/* 🔥 NAZWA – bardzo duża */
#name {
  font-size:16vh;
  color:yellow;
  font-weight:bold;
  margin-top:2vh;
}

/* klub */
#club {
  font-size:6vh;
  margin-bottom:2vh;
}

/* 🔥 CIĘŻAR – OGROMNY */
#weight {
  font-size:28vh;
  color:red;
  font-weight:bold;
  line-height:1;
}

/* BEST */
#best {
  font-size:6vh;
  color:gold;
  margin-top:2vh;
}

/* 🔥 TIMER */
#timer {
  font-size:18vh;
  font-weight:bold;
  margin-top:2vh;
}

/* kolejny zawodnik */
#next {
  position:absolute;
  bottom:2vh;
  width:100%;
  font-size:5vh;
  color:lightblue;
}
</style>

</head>

<body>

<div id="name"></div>
<div id="club"></div>
<div id="weight"></div>
<div id="best"></div>
<div id="timer"></div>
<div id="next"></div>

<script>

function update(){

  let d = JSON.parse(localStorage.getItem("live"));
  let t = JSON.parse(localStorage.getItem("timer"));

  if(!d) return;

  // dane
  document.getElementById("name").innerText = d.name || "";
  document.getElementById("club").innerText = d.club || "";
  document.getElementById("weight").innerText = (d.weight||"") + " kg";
  document.getElementById("best").innerText = "BEST: " + (d.best || 0) + " kg";

  // timer
  let time = t ? t.value : 60;

  let color = "white";
  if(time <= 20) color = "red";
  else if(time <= 40) color = "yellow";

  let timerEl = document.getElementById("timer");
  timerEl.innerText = time;
  timerEl.style.color = color;

  // kolejny
  document.getElementById("next").innerText =
    d.next ? "W KOLEJCE: " + d.next : "";
}

// LIVE aktualizacja
window.addEventListener("storage", update);
setInterval(update,200);

update();

</script>

</body>
</html>
