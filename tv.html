<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>TV</title>

<style>
body {background:black;color:white;text-align:center;font-family:Arial;}
#name{font-size:10vh;color:yellow;}
#weight{font-size:14vh;color:red;}
#next{font-size:5vh;color:lightblue;}
</style>
</head>

<body>

<h1>NA POMOŚCIE</h1>

<div id="name"></div>
<div id="weight"></div>
<div id="next"></div>

<script>

function update(){

  let data = JSON.parse(localStorage.getItem("live"));
  if(!data) return;

  document.getElementById("name").innerText = data.name || "";
  document.getElementById("weight").innerText = (data.weight||"")+" kg";

  document.getElementById("next").innerText =
    data.nextName ? "W KOLEJCE: "+data.nextName : "";
}

// 🔥 NAJWAŻNIEJSZE
window.addEventListener("storage", update);

// 🔥 fallback
setInterval(update,200);

update();

</script>

</body>
</html>
