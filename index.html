<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Zawody FINAL SYNC</title>

<style>
body { font-family: Arial; background:#111; color:#fff; text-align:center; }
.container { display:flex; flex-wrap:wrap; justify-content:center; }
.group { border:1px solid #444; margin:10px; padding:10px; width:420px; }
input { margin:2px; padding:5px; width:65px; }
button { margin:2px; padding:6px; }
.ok { background:green; }
.fail { background:red; }
.timer { color:cyan; font-size:28px; }
</style>
</head>

<body>

<h1>PANEL SĘDZIOWSKI</h1>

<button onclick="openTV()">📺 TV</button>

<div class="container" id="groups"></div>

<h2>Pomost</h2>
<div id="platform"></div>

<button onclick="nextMove()">➡️ Następny ruch</button>

<script>

let groups=[10,10,10,12];
let lifters=[];

let currentGroup=0;
let currentIndex=0;
let currentRound=0;

let timer=60;
let timerInterval=null;

function toNum(v){
  return parseFloat((v||"").replace(",", "."))||0;
}

// ===== INIT =====
function init(){

  let c=document.getElementById("groups");
  let id=0;

  groups.forEach((size,g)=>{
    let div=document.createElement("div");
    div.className="group";
    div.innerHTML="<h3>Grupa "+(g+1)+"</h3>";

    for(let i=0;i<size;i++){

      lifters.push({
        group:g,name:"",club:"",
        category:"",record:"",
        attempts:[
          {weight:"",ok:null},
          {weight:"",ok:null},
          {weight:"",ok:null}
        ]
      });

      div.innerHTML+=`
        <input placeholder="Nazwisko"
        onchange="lifters[${id}].name=this.value; renderPlatform()">

        <input placeholder="Klub"
        onchange="lifters[${id}].club=this.value; renderPlatform()">

        <input placeholder="Kat."
        onchange="lifters[${id}].category=this.value; renderPlatform()">

        <input placeholder="Rekord"
        onchange="lifters[${id}].record=this.value; renderPlatform()"><br>

        ${renderAttempt(id,0)}
        ${renderAttempt(id,1)}
        ${renderAttempt(id,2)}
        <br>
      `;

      id++;
    }

    c.appendChild(div);
  });

  renderPlatform();
}

// ===== PRÓBY =====
function renderAttempt(id,n){
  return `
    <input placeholder="${n+1}"
    oninput="setAttempt(${id},${n},this.value)">

    <button onclick="setResult(${id},${n},true)">✔</button>
    <button onclick="setResult(${id},${n},false)">❌</button>
  `;
}

function setAttempt(id,n,val){
  lifters[id].attempts[n].weight=val;
  renderPlatform();
}

function setResult(id,n,res){
  lifters[id].attempts[n].ok=res;
  renderPlatform();
}

// ===== KOLEJKA =====
function getQueue(){
  return lifters
    .filter(l=>l.group===currentGroup && l.attempts[currentRound].weight)
    .sort((a,b)=>toNum(a.attempts[currentRound].weight)-toNum(b.attempts[currentRound].weight));
}

// ===== PLATFORM =====
function renderPlatform(){

  let q=getQueue();

  if(!q.length){
    document.getElementById("platform").innerHTML="Wpisz ciężary";
    return;
  }

  if(currentIndex>=q.length) currentIndex=0;

  let l=q[currentIndex];
  let next=(currentIndex+1<q.length)?q[currentIndex+1]:null;

  document.getElementById("platform").innerHTML=`
    <h2>${l.name}</h2>
    <h1>${l.attempts[currentRound].weight} kg</h1>
  `;

  // 🔥 SYNC LIVE
  localStorage.setItem("live", JSON.stringify({
    name:l.name,
    weight:l.attempts[currentRound].weight,
    nextName:next?next.name:"",
    nextWeight:next?next.attempts[currentRound].weight:"",
    time:Date.now()
  }));
}

// ===== NEXT =====
function nextMove(){

  let q=getQueue();
  if(!q.length) return;

  if(currentIndex<q.length-1){
    currentIndex++;
  } else {
    if(currentRound<2){
      currentRound++;
      currentIndex=0;
    } else {
      currentGroup++;
      currentRound=0;
      currentIndex=0;
    }
  }

  renderPlatform();
}

// ===== TV =====
function openTV(){
  window.open("tv.html","_blank");
}

init();

</script>

</body>
</html>
