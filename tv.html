<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>TV PRO FINAL</title>

<style>
body {
  background:black;
  color:white;
  font-family:Arial;
  margin:0;
  overflow:hidden;

  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

#wrap {
  text-align:center;
  transform: translateY(5vh);
}

/* NAZWA */
#name {
  font-size:14vh;
  color:yellow;
  font-weight:bold;
}

/* klub */
#club {
  font-size:6vh;
}

/* ciężar */
#weight {
  font-size:26vh;
  color:red;
  font-weight:bold;
}

/* BEST */
#best {
  font-size:6vh;
  color:gold;
}

/* TIMER */
#timer {
  font-size:18vh;
  font-weight:bold;
}

/* 🔥 NAPIS REKORD */
#record {
  position:absolute;
  top:8%;
  width:100%;
  text-align:center;
  font-size:10vh;
  font-weight:bold;
  display:none;
}

/* 🔥 ANIMACJA */
@keyframes pulse {
  0% { transform: scale(1); opacity:1; }
  50% { transform: scale(1.2); opacity:0.5; }
  100% { transform: scale(1); opacity:1; }
}

.recordOn {
  display:block !important;
  animation: pulse 1.5s infinite;
}
</style>

</head>

<body>

<div id="record"></div>

<div id="wrap">
  <div id="name"></div>
  <div id="club"></div>
  <div id="weight"></div>
  <div id="best"></div>
  <div id="timer"></div>
</div>

<script>

let recordTimeout = null;

function update(){

  let d = JSON.parse(localStorage.getItem("live"));
  let t = JSON.parse(localStorage.getItem("timer"));

  if(!d) return;

  // dane
  document.getElementById("name").innerText = d.name || "";
  document.getElementById("club").innerText = d.club || "";
  document.getElementById("weight").innerText = (d.weight||"")+" kg";
  document.getElementById("best").innerText = "BEST: " + (d.best||0);

  // timer
  let time = t ? t.value : 60;

  let color = "white";
  if(time <= 20) color = "red";
  else if(time <= 40) color = "yellow";

  let timerEl = document.getElementById("timer");
  timerEl.innerText = time;
  timerEl.style.color = color;

  // 🔥 REKORD / PRÓBA
  let rec = document.getElementById("record");

  // zatrzymaj poprzedni timeout
  if(recordTimeout){
    clearTimeout(recordTimeout);
  }

  // 🔥 NOWY REKORD (zielony)
  if(d.record){
    rec.innerText = "🔥 NOWY REKORD!";
    rec.style.color = "lime"; // ✅ ZIELONY
    rec.classList.add("recordOn");

    recordTimeout = setTimeout(()=>{
      rec.classList.remove("recordOn");
    },10000);
  }

  // 🔥 PRÓBA NA REKORD (złota)
  else if(d.attemptRecord){
    rec.innerText = "PRÓBA NA REKORD";
    rec.style.color = "gold";
    rec.classList.add("recordOn");
  }

  else{
    rec.classList.remove("recordOn");
  }
}

// LIVE
window.addEventListener("storage", update);
setInterval(update,200);

update();

</script>

</body>
</html>
