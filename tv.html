<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>TV</title>

<style>
body { background:black; color:white; text-align:center; font-family:Arial; }
#name { font-size:10vh; color:yellow; }
#club { font-size:5vh; }
#weight { font-size:14vh; color:red; }
#timer { font-size:10vh; color:cyan; }
#next { font-size:5vh; color:lightblue; }
</style>
</head>

<body>

<h1>NA POMOŚCIE</h1>

<div id="name"></div>
<div id="club"></div>
<div id="weight"></div>
<div id="timer"></div>
<div id="next"></div>

<script>

function update(){

  let d = JSON.parse(localStorage.getItem("live"));
  let t = JSON.parse(localStorage.getItem("timer"));

  if(!d) return;

  document.getElementById("name").innerText = d.name || "";
  document.getElementById("club").innerText = d.club || "";
  document.getElementById("weight").innerText = (d.weight||"")+" kg";

  document.getElementById("timer").innerText =
    "CZAS: " + (t ? t.value : 0) + "s";

  document.getElementById("next").innerText =
    d.next ? "W KOLEJCE: " + d.next : "";
}

window.addEventListener("storage", update);
setInterval(update,200);

update();

</script>

</body>
</html>
