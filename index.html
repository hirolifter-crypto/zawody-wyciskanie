<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Zawody</title>

<style>
body { font-family: Arial; background:#111; color:#fff; text-align:center; }
.container { display:flex; flex-wrap:wrap; justify-content:center; }
.group { border:1px solid #444; margin:10px; padding:10px; width:300px; }
input { margin:2px; padding:5px; }
button { margin:5px; padding:10px; }
</style>
</head>

<body>

<h1>PANEL SĘDZIOWSKI</h1>

<button onclick="openTV()">📺 Ekran TV</button>

<div class="container" id="groups"></div>

<h2>Pomost</h2>
<div id="platform"></div>

<button onclick="nextLifter()">➡️ Następny</button>
<button onclick="prevLifter()">⬅️ Cofnij</button>

<script>
let groups = [10,10,10,12];
let lifters = [];
let currentIndex = 0;

function init() {
  let container = document.getElementById("groups");
  container.innerHTML = "";
  lifters = [];

  let id = 0;

  groups.forEach((size, g) => {
    let div = document.createElement("div");
    div.className = "group";
    div.innerHTML = "<h3>Grupa " + (g+1) + "</h3>";

    for (let i=0;i<size;i++) {
      lifters.push({
        name: "",
        category: "",
        attempts: ["","",""]
      });

      div.innerHTML += `
        <input placeholder="Nazwisko" onchange="lifters[${id}].name=this.value">
        <input placeholder="Kat." onchange="lifters[${id}].category=this.value">
        <br>
      `;
      id++;
    }

    container.appendChild(div);
  });

  renderPlatform();
}

function renderPlatform() {
  let l = lifters[currentIndex];

  document.getElementById("platform").innerHTML = `
    <h3>${l.name || "BRAK"} (${l.category || "-"})</h3>
    1: <input onchange="lifters[${currentIndex}].attempts[0]=this.value;sync()">
    2: <input onchange="lifters[${currentIndex}].attempts[1]=this.value;sync()">
    3: <input onchange="lifters[${currentIndex}].attempts[2]=this.value;sync()">
  `;

  sync();
}

function nextLifter() {
  if (currentIndex < lifters.length-1) {
    currentIndex++;
    renderPlatform();
  }
}

function prevLifter() {
  if (currentIndex > 0) {
    currentIndex--;
    renderPlatform();
  }
}

function sync() {
  let l = lifters[currentIndex];
  localStorage.setItem("live", JSON.stringify(l));
}

function openTV() {
  window.open("tv.html", "_blank");
}

init();
</script>

</body>
</html>
