<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>EKRAN TV</title>

<style>
body {
  background:black;
  color:white;
  text-align:center;
  font-family:Arial;
  margin:0;
}

.container {
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
}

h1 { font-size:5vh; }

#current {
  font-size:10vh;
  color:yellow;
}

#club {
  font-size:4vh;
  color:lightgray;
}

#weight {
  font-size:14vh;
  color:red;
}

#timer {
  font-size:10vh;
  color:cyan;
}

#next {
  margin-top:4vh;
  font-size:4vh;
  color:lightgray;
}
</style>
</head>

<body>

<div class="container">

<h1>NA POMOŚCIE</h1>

<div id="current">---</div>
<div id="club"></div>
<div id="weight">---</div>
<div id="timer"></div>

<div id="next"></div>

</div>

<script>

function update() {
  let data = JSON.parse(localStorage.getItem("live"));
  let t = localStorage.getItem("timer");

  if (!data) return;

  document.getElementById("current").innerText = data.name || "---";
  document.getElementById("club").innerText = data.club || "";
  document.getElementById("weight").innerText =
    (data.weight || "---") + " kg";

  document.getElementById("timer").innerText =
    t ? "CZAS: " + t + "s" : "";

  if (data.nextName) {
    document.getElementById("next").innerText =
      "W KOLEJCE: " + data.nextName + " (" + data.nextWeight + " kg)";
  } else {
    document.getElementById("next").innerText = "";
  }
}

setInterval(update, 200);
update();

</script>

</body>
</html>
